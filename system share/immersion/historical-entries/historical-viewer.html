    <!-- Main application script -->
    <script>
        // Extract all embedded markdown entries
        const entries = [];
        document.querySelectorAll('script[type="text/markdown"]').forEach(script => {
            entries.push({
                id: script.id,
                title: script.dataset.title,
                category: script.dataset.category,
                markdown: script.textContent.trim()
            });
        });

        console.log('Loaded entries:', entries.length);
        entries.forEach(entry => {
            console.log(`- ${entry.title} (${entry.markdown.length} chars)`);
        });

        // Simple markdown-to-HTML converter (basic, proof of concept)
        function convertMarkdown(md) {
            let html = md;
            
            // Headers
            html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
            html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
            
            // Bold and italic
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            
            // Lists
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
            
            // Blockquotes
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
            
            // Paragraphs
            html = html.replace(/\n\n/g, '</p><p>');
            html = '<p>' + html + '</p>';
            
            // Cleanup
            html = html.replace(/<p>\s*<\/p>/g, '');
            html = html.replace(/<p>(\s*<h[234])/g, '$1');
            html = html.replace(/(<\/h[234]>)\s*<\/p>/g, '$1');
            html = html.replace(/<p>(\s*<ul)/g, '$1');
            html = html.replace(/(<\/ul>)\s*<\/p>/g, '$1');
            
            return html;
        }

        // Render entry list
        const listDiv = document.getElementById('entry-list');
        listDiv.innerHTML = '<h2>Available Entries:</h2>' +
            entries.map(entry => 
                `<div onclick="showEntry('${entry.id}')" style="cursor: pointer; padding: 10px; margin: 5px 0; border: 1px solid #ccc;">
                    <strong>${entry.title}</strong> <em>(${entry.category})</em>
                </div>`
            ).join('');

        // Show entry
        function showEntry(id) {
            const entry = entries.find(e => e.id === id);
            if (!entry) return;
            
            const displayDiv = document.getElementById('entry-display');
            displayDiv.innerHTML = `
                <h2>${entry.title}</h2>
                <div>${convertMarkdown(entry.markdown)}</div>
            `;
            
            console.log('Displaying:', entry.title);
        }

        console.log('Proof of concept ready. Click an entry to display.');
    </script>
